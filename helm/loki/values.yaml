global:
  image:
    # -- Overrides the Docker registry globally for all images
    registry: gsoci.azurecr.io
  # -- Overrides the priorityClassName for all pods
  priorityClassName:
  # -- configures cluster domain ("cluster.local" by default)
  clusterDomain: "cluster.local"
  # -- configures DNS service name
  dnsService: "coredns"
  # -- configures DNS service namespace
  dnsNamespace: "kube-system"

# -- Override the name of the chart
nameOverride: ""

loki:
  # You can make the whole chart ineffective by setting this one to "false"
  enabled: true

  deploymentMode: SimpleScalable

  # -- Override the name of the loki subchart
  nameOverride: ""

  loki:
    image:
      repository: giantswarm/loki

    # -- Loki Storage schema configuration
    #    Loki 3 requires a schema to be configured so we configure v13, the latest.
    #    Doc is here: https://grafana.com/docs/loki/latest/configure/storage/#schema-config
    schemaConfig:
      configs:
        - from: 2024-04-01
          object_store: s3
          store: tsdb
          schema: v13
          index:
            prefix: index_
            period: 24h
    # -- Loki Storage configuration
    storage:
      # --- Loki requires a bucket for chunks and the ruler.
      # TODO(user): Please provide these values if you are using object storage.
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin

  gateway:
    extraContainers:
      - name: dnsmasq
        image: "gsoci.azurecr.io/giantswarm/go-dnsmasq:release-1.0.7"
        imagePullPolicy: IfNotPresent
        args:
          - --listen
          - "127.0.0.1:8053"
          - --hostsfile=/etc/hosts
          - --enable-search
          - --verbose
        securityContext:
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 10Mi
    # -- Gateway access log exporter (introduced in v9). Disabled by default
    # as the image (ghcr.io/jkroepke/access-log-exporter) is not mirrored
    # in gsoci.azurecr.io. Enable and configure a mirrored image to use it.
    metrics:
      enabled: false
    nginxConfig:
      resolver: "127.0.0.1:8053 valid=60s"
    autoscaling:
      enabled: true
      minReplicas: 2
      targetCPUUtilizationPercentage: 90
      targetMemoryUtilizationPercentage: 90
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    image:
      repository: giantswarm/nginx-unprivileged
    resources:
      limits:
        memory: 500Mi
      requests:
        memory: 50Mi
        cpu: 50m
    # -- Gateway API Routes for loki-gateway
    route:
      # -- Enables or disables the route
      enabled: false

      # -- Set the route apiVersion, e.g. gateway.networking.k8s.io/v1 or gateway.networking.k8s.io/v1alpha2
      apiVersion: gateway.networking.k8s.io/v1
      # -- Set the route kind
      # Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
      kind: HTTPRoute

      annotations: {}
      labels: {}

      hostnames: []
      # - my-filter.example.com
      parentRefs: []
      # - name: acme-gw

      matches:
        - path:
            type: PathPrefix
            value: /

      ## Filters define the filters that are applied to requests that match this rule.
      filters: []

      ## Additional custom rules that can be added to the route
      additionalRules: []

      securityPolicy:
        enabled: false
        annotations: {}
        labels: {}
        # basicAuth:
        #   users:
        #     name: <secret_name>

      backendTrafficPolicy:
        enabled: false
        annotations: {}
        labels: {}
        timeout:
          tcp:
            connectTimeout: 60s

      httpRouteFilter:
        enabled: false
        annotations: {}
        labels: {}
        directResponse:
          contentType: text/plain
          statusCode: 400
          body:
            type: Inline
            inline: "Bad Request"

  backend:
    # -- Disable per-component service account so backend uses the shared
    # top-level "loki" service account (required for IRSA annotations to apply).
    serviceAccount:
      create: false
    autoscaling:
      enabled: true
      minReplicas: 2
      targetCPUUtilizationPercentage: 90
      targetMemoryUtilizationPercentage: 90
    resources:
      limits:
        memory: 3Gi
      requests:
        memory: 1Gi
        cpu: 200m

  read:
    # -- Disable per-component service account so read uses the shared
    # top-level "loki" service account (required for IRSA annotations to apply).
    serviceAccount:
      create: false
    autoscaling:
      enabled: true
      minReplicas: 2
      targetCPUUtilizationPercentage: 90
      targetMemoryUtilizationPercentage: 90
    resources:
      limits:
        memory: 3Gi
      requests:
        memory: 1Gi
        cpu: 200m
    extraArgs:
      - -querier.multi-tenant-queries-enabled

  write:
    # -- Disable per-component service account so write uses the shared
    # top-level "loki" service account (required for IRSA annotations to apply).
    serviceAccount:
      create: false
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetMemoryUtilizationPercentage: 90
    resources:
      limits:
        memory: 4Gi
      requests:
        memory: 3Gi
        cpu: 500m

  # -- Canary configuration
  # The Loki canary pushes logs to and queries from this loki installation to test
  # that it's working correctly
  lokiCanary:
    enabled: false
    kind: Deployment
    replicas: 3
    # -- Image to use for loki canary
    image:
      # -- Docker image repository
      repository: giantswarm/loki-canary

  # -- Configuration of monitoring components
  monitoring:
    serviceMonitor:
      enabled: true

  # -- Configuration of Loki's network policy
  networkPolicy:
    enabled: true
    flavor: cilium
    egressWorld:
      # -- Enable additional cilium egress rules to external world for write, read and backend.
      enabled: true
    egressCoredns:
      # -- Enable additional cilium egress rules to coredns for write, read and backend.
      enabled: true
    egressKubeApiserver:
      # -- Enable additional cilium egress rules to kube-apiserver for backend.
      enabled: true
    egressMimir:
      # -- Enable additional cilium egress rules to Mimir for backend.
      enabled: true

  # -- Configuration of Loki's service account
  serviceAccount:
    # -- The name of the ServiceAccount to use.
    # Pinned to "loki" to ensure a stable name regardless of release name,
    # which is required for IRSA/workload identity annotations.
    name: loki

  sidecar:
    image:
      repository: giantswarm/k8s-sidecar
    resources:
      limits:
        cpu: 100m
        memory: 100Mi
      requests:
        cpu: 50m
        memory: 50Mi

  test:
    enabled: false

# -- Crossplane configuration for cloud resource provisioning
crossplane:
  # -- Enable automated storage provisioning via Crossplane
  enabled: false
  # -- Whether the object storage should be private (no public endpoint, access via private endpoint only)
  private: false
  # -- Cloud provider type for storage: 'aws' for S3, 'azure' for Azure Storage
  provider: aws
  # -- Cluster provider type (optional, defaults to provider value): 'aws', 'azure', 'vsphere', 'vcd'
  # Use this when cluster provider differs from storage provider (e.g., vsphere cluster with azure storage)
  clusterProvider: ""
  # -- Crossplane ProviderConfig name
  providerConfigRef: "default"
  # -- Cloud region for resources
  region: ""
  # -- Cluster name (used for cluster discovery)
  clusterName: ""
  # -- Cluster namespace (used for cluster discovery)
  clusterNamespace: "org-giantswarm"
  # -- Enable observe-only mode for safe migration
  observeOnly: false
  # -- Additional tags to apply to all storage resources
  # Tags from cluster CR will be merged automatically
  tags: []
  # - key: team
  #   value: atlas

  # -- AWS-specific configuration
  aws:
    # -- Enable AWS resources (S3, IAM)
    enabled: false
    # -- S3 Bucket configuration for Loki storage
    bucket:
      # -- Bucket name for Loki storage (used for chunks, ruler, and admin)
      name: ""
      # -- Number of days to retain logs before expiration
      lifecycleDays: 100
    # -- IAM Role configuration for IRSA
    iam:
      # -- Enable IAM role creation via Crossplane
      enabled: true

  # -- Azure-specific configuration
  azure:
    # -- Enable Azure resources (Storage Account, Container)
    enabled: false
    # -- Azure Resource Group name
    resourceGroup: ""
    # -- Azure Subscription ID (optional, will be looked up from AzureCluster CR if not provided)
    subscriptionId: ""
    # -- Storage container configuration
    container:
      # -- Container name for Loki storage (used for chunks, ruler, and admin)
      name: ""
      # -- Number of days to retain logs before expiration (optional, omit to disable lifecycle)
      lifecycleDays: 100
