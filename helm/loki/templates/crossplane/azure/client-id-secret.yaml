{{- if and .Values.loki.enabled .Values.crossplane.enabled (include "loki.crossplane.isAzure" .) .Values.crossplane.azure.enabled .Values.crossplane.azure.workloadIdentity.enabled }}
{{- $containerName := .Values.crossplane.azure.container.name }}
{{- $identityName := include "loki.crossplane.azure.identityName" (dict "containerName" $containerName) }}
{{- $wi := .Values.crossplane.azure.workloadIdentity }}
---
# The identity's clientId is generated by Azure and only known after the identity
# reconciles. provider-kubernetes copies it from status.atProvider.clientId into a
# Secret that the Loki pods consume as AZURE_CLIENT_ID. This reuses the provider's
# existing permission over Secrets, so no extra ServiceAccount RBAC is required.
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: {{ $identityName }}-client-id
  labels:
    {{- include "loki.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
spec:
  managementPolicies:
    {{- if .Values.crossplane.observeOnly }}
    - Observe
    {{- else }}
    - "*"
    {{- end }}
  providerConfigRef:
    name: {{ $wi.providerKubernetes.providerConfigRef }}
  references:
    - patchesFrom:
        apiVersion: managedidentity.azure.upbound.io/v1beta1
        kind: UserAssignedIdentity
        name: {{ $identityName }}
        fieldPath: status.atProvider.clientId
      # toFieldPath is relative to the wrapped manifest (the Secret), not the Object.
      toFieldPath: stringData.AZURE_CLIENT_ID
  forProvider:
    manifest:
      apiVersion: v1
      kind: Secret
      metadata:
        name: {{ $wi.clientIdSecretName }}
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "loki.labels" . | nindent 10 }}
          app.kubernetes.io/component: identity
      type: Opaque
      stringData:
        # Overwritten by the reference above with the identity's clientId.
        AZURE_CLIENT_ID: ""
{{- end }}
