{{- if and .Values.loki.enabled .Values.crossplane.enabled (include "loki.crossplane.isAzure" .) .Values.crossplane.azure.enabled .Values.crossplane.azure.workloadIdentity.enabled }}
{{- $containerName := .Values.crossplane.azure.container.name }}
{{- $identityName := include "loki.crossplane.azure.identityName" (dict "containerName" $containerName) }}
{{- $saName := .Values.loki.serviceAccount.name | default "loki" }}
{{- $issuer := include "loki.crossplane.azure.oidcIssuer" . }}
{{- /* Probe for API access: empty only during `helm template` (no cluster). On a real
       install/upgrade the cluster is reachable, so a missing issuer is a hard error. */}}
{{- $clusterReachable := lookup "v1" "Namespace" "" "kube-system" }}
{{- if and $clusterReachable (not $issuer) }}
{{- fail "loki: could not auto-detect the Azure Workload Identity OIDC issuer from kube-system/kubeadm-config; set crossplane.azure.workloadIdentity.oidcIssuerUrl explicitly" }}
{{- end }}
{{- if $issuer }}
---
apiVersion: managedidentity.azure.upbound.io/v1beta1
kind: FederatedIdentityCredential
metadata:
  name: {{ $identityName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
  annotations:
    crossplane.io/external-name: {{ $identityName }}
spec:
  managementPolicies:
    {{- if .Values.crossplane.observeOnly }}
    - Observe
    {{- else }}
    - "Create"
    - "Update"
    - "LateInitialize"
    - "Observe"
    {{- end }}
  forProvider:
    audience:
      - api://AzureADTokenExchange
    issuer: {{ $issuer | quote }}
    subject: {{ printf "system:serviceaccount:%s:%s" .Release.Namespace $saName | quote }}
    resourceGroupName: {{ .Values.crossplane.azure.resourceGroup }}
    # Reference the identity created by identity.yaml by its (deterministic) name.
    parentIdRef:
      name: {{ $identityName }}
  providerConfigRef:
    name: {{ .Values.crossplane.providerConfigRef }}
{{- end }}
{{- end }}
