{{- if and .Values.loki.enabled .Values.crossplane.enabled (include "loki.crossplane.isAzure" .) .Values.crossplane.azure.enabled .Values.crossplane.azure.workloadIdentity.enabled }}
{{- $containerName := .Values.crossplane.azure.container.name }}
{{- $identityName := include "loki.crossplane.azure.identityName" (dict "containerName" $containerName) }}
{{- $saName := .Values.loki.serviceAccount.name | default "loki" }}
{{- $issuer := required "crossplane.azure.workloadIdentity.oidcIssuerUrl is required when workload identity is enabled" .Values.crossplane.azure.workloadIdentity.oidcIssuerUrl }}
---
apiVersion: managedidentity.azure.upbound.io/v1beta1
kind: FederatedIdentityCredential
metadata:
  name: {{ $identityName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
  annotations:
    crossplane.io/external-name: {{ $identityName }}
spec:
  managementPolicies:
    {{- if .Values.crossplane.observeOnly }}
    - Observe
    {{- else }}
    - "Create"
    - "Update"
    - "LateInitialize"
    - "Observe"
    {{- end }}
  forProvider:
    audience:
      - api://AzureADTokenExchange
    issuer: {{ $issuer | quote }}
    subject: {{ printf "system:serviceaccount:%s:%s" .Release.Namespace $saName | quote }}
    resourceGroupName: {{ .Values.crossplane.azure.resourceGroup }}
    # Resolve the parent identity created by identity.yaml via its labels.
    parentIdSelector:
      matchLabels:
        app.kubernetes.io/component: identity
        app.kubernetes.io/name: {{ include "loki.name" . }}
  providerConfigRef:
    name: {{ .Values.crossplane.providerConfigRef }}
{{- end }}
