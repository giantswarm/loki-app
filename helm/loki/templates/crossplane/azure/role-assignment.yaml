{{- if and .Values.loki.enabled .Values.crossplane.enabled (include "loki.crossplane.isAzure" .) .Values.crossplane.azure.enabled .Values.crossplane.azure.workloadIdentity.enabled }}
{{- $containerName := .Values.crossplane.azure.container.name }}
{{- $identityName := include "loki.crossplane.azure.identityName" (dict "containerName" $containerName) }}
{{- $containerId := include "loki.crossplane.azure.containerId" . }}
{{- $workloadIdentity := .Values.crossplane.azure.workloadIdentity }}
---
# The upbound RoleAssignment has no selector for principalId, and the identity's
# principalId is generated by Azure (only present on status.atProvider once it has
# reconciled). provider-kubernetes manages the RoleAssignment as a wrapped manifest
# and patches principalId in from the identity status, so no manual value is needed.
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: {{ $identityName }}-role-assignment
  labels:
    {{- include "loki.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
spec:
  # Fully managed (see identity.yaml): recreatable, always net-new access resource.
  managementPolicies:
    - "*"
  providerConfigRef:
    name: {{ $workloadIdentity.providerKubernetes.providerConfigRef }}
  references:
    - patchesFrom:
        apiVersion: managedidentity.azure.upbound.io/v1beta1
        kind: UserAssignedIdentity
        name: {{ $identityName }}
        fieldPath: status.atProvider.principalId
      # toFieldPath is relative to the wrapped manifest (the RoleAssignment), not the Object.
      toFieldPath: spec.forProvider.principalId
  forProvider:
    manifest:
      apiVersion: authorization.azure.upbound.io/v1beta1
      kind: RoleAssignment
      metadata:
        name: {{ $identityName }}
        labels:
          {{- include "loki.labels" . | nindent 10 }}
          app.kubernetes.io/component: identity
      spec:
        forProvider:
          roleDefinitionName: {{ $workloadIdentity.roleDefinitionName | quote }}
          scope: {{ $containerId | quote }}
          principalType: ServicePrincipal
          # principalId is injected by the reference above once the identity reconciles.
        providerConfigRef:
          name: {{ .Values.crossplane.providerConfigRef }}
{{- end }}
