{{- if and .Values.loki.enabled .Values.crossplane.enabled (include "loki.crossplane.isAzure" .) .Values.crossplane.azure.enabled .Values.crossplane.azure.workloadIdentity.enabled .Values.crossplane.azure.workloadIdentity.principalId }}
{{- $containerName := .Values.crossplane.azure.container.name }}
{{- $identityName := include "loki.crossplane.azure.identityName" (dict "containerName" $containerName) }}
{{- $storageAccountId := include "loki.crossplane.azure.storageAccountId" . }}
---
# The upbound RoleAssignment cannot reference the identity's principalId via a
# selector, so principalId must be supplied explicitly. It is generated by Azure
# and only known after the UserAssignedIdentity has reconciled once. This resource
# is therefore skipped until crossplane.azure.workloadIdentity.principalId is set.
apiVersion: authorization.azure.upbound.io/v1beta1
kind: RoleAssignment
metadata:
  name: {{ $identityName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
spec:
  managementPolicies:
    {{- if .Values.crossplane.observeOnly }}
    - Observe
    {{- else }}
    - "*"
    {{- end }}
  forProvider:
    principalId: {{ .Values.crossplane.azure.workloadIdentity.principalId | quote }}
    roleDefinitionName: {{ .Values.crossplane.azure.workloadIdentity.roleDefinitionName | quote }}
    scope: {{ $storageAccountId | quote }}
  providerConfigRef:
    name: {{ .Values.crossplane.providerConfigRef }}
{{- end }}
