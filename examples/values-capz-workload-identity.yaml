# Example: CAPZ (Azure) with Crossplane-managed storage and Workload Identity.
#
# Loki authenticates to Blob storage with a federated token (Azure Workload
# Identity) instead of a static storage account key. The cluster must have the
# Azure Workload Identity webhook installed (namespace giantswarm:
#   kubectl get deploy -n giantswarm | grep azure-wi-webhook).
#
# Bootstrap is a two-step process because the identity's clientId and principalId
# are generated by Azure and not known at install time:
#
#   1. Install with the crossplane block below. This creates the storage account,
#      container, User-Assigned Managed Identity and Federated Identity Credential.
#      (The role assignment is skipped until principalId is set.)
#   2. Read the generated IDs from the identity connection secret:
#        kubectl get secret <container-name>-identity -n loki \
#          -o jsonpath='{.data.clientId}'   | base64 -d
#        kubectl get secret <container-name>-identity -n loki \
#          -o jsonpath='{.data.principalId}' | base64 -d
#      Then set:
#        - crossplane.azure.workloadIdentity.principalId (creates the role assignment)
#        - loki.serviceAccount.annotations."azure.workload.identity/client-id"
#      and upgrade.

crossplane:
  enabled: true
  provider: azure
  region: westeurope
  clusterName: "my-installation"  # MUST match your AzureCluster CR name
  resourceGroup: "my-installation"
  azure:
    enabled: true
    resourceGroup: "my-installation"
    container:
      name: giantswarm-my-installation-loki
    workloadIdentity:
      enabled: true
      # kube-apiserver --service-account-issuer of the cluster.
      oidcIssuerUrl: "https://oidcissuerXXXXXXXX.blob.core.windows.net/oidc-test/"
      roleDefinitionName: "Storage Blob Data Contributor"
      # Set after step 2 above to create the role assignment.
      principalId: ""

loki:
  serviceAccount:
    annotations:
      # clientId of the User-Assigned Managed Identity (set after step 2 above).
      azure.workload.identity/client-id: ""
      azure.workload.identity/tenant-id: "31f75bf9-3d8c-4691-95c0-83dd71613db8"

  loki:
    storage:
      type: azure
      bucketNames:
        chunks: giantswarm-my-installation-loki
        ruler: giantswarm-my-installation-loki
        admin: giantswarm-my-installation-loki
      azure:
        accountName: ""  # storage account name (sanitized container name, max 24 chars)
        # No accountKey — authentication uses the federated token.
        useFederatedToken: true

  # The webhook only injects the AZURE_* env (incl. the federated token) into pods
  # carrying this label. Only the components that talk to object storage need it.
  backend:
    podLabels:
      azure.workload.identity/use: "true"
  read:
    podLabels:
      azure.workload.identity/use: "true"
  write:
    podLabels:
      azure.workload.identity/use: "true"
