# Example: CAPZ (Azure) with Crossplane-managed storage and Workload Identity.
#
# Loki authenticates to Blob storage with a federated token (Azure Workload
# Identity) instead of a static storage account key. This is a single-pass
# install: Crossplane provisions the storage, a User-Assigned Managed Identity,
# a Federated Identity Credential and a role assignment, and provider-kubernetes
# copies the identity's generated clientId into a Secret that the pods consume.
#
# Prerequisites on the cluster:
#   - provider-kubernetes with an in-cluster ProviderConfig
#   - the ClusterRole/binding shipped by this chart (templates/crossplane/azure/rbac.yaml)
#
# Note: this does NOT rely on the Azure Workload Identity webhook. The AZURE_*
# environment and the projected token volume are set explicitly below, and
# AZURE_CLIENT_ID is read from the Secret the chart populates.

crossplane:
  enabled: true
  provider: azure
  region: westeurope
  clusterName: "my-installation"  # MUST match your AzureCluster CR name
  resourceGroup: "my-installation"
  azure:
    enabled: true
    resourceGroup: "my-installation"
    container:
      name: giantswarm-my-installation-loki
    workloadIdentity:
      enabled: true
      # oidcIssuerUrl is auto-detected from the cluster's kube-apiserver
      # --service-account-issuer (kube-system/kubeadm-config). Set it explicitly
      # only on non-kubeadm clusters where auto-detection cannot find it:
      # oidcIssuerUrl: "https://oidcissuerXXXXXXXX.blob.core.windows.net/oidc-test/"
      roleDefinitionName: "Storage Blob Data Contributor"
      # Defaults shown; override only if your provider-kubernetes differs.
      providerKubernetes:
        providerConfigRef: in-cluster
        serviceAccount:
          name: upbound-contrib-provider-kubernetes
          namespace: crossplane

loki:
  loki:
    storage:
      type: azure
      bucketNames:
        chunks: giantswarm-my-installation-loki
        ruler: giantswarm-my-installation-loki
        admin: giantswarm-my-installation-loki
      azure:
        accountName: ""  # storage account name (sanitized container name, max 24 chars)
        # No accountKey — authentication uses the federated token.
        useFederatedToken: true

  # The federated-token environment (AZURE_CLIENT_ID/AZURE_TENANT_ID from the
  # chart-managed loki-azure-identity secret, plus the projected token volume) is
  # applied to all components by the chart's global.extraEnv/extraVolumes defaults,
  # so nothing per-component is needed here.
